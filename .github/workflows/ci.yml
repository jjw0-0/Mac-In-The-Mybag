name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build (all targets)
        run: swift build

      - name: Test (SharedCore + MacOSAgent)
        run: swift test

  ios-build:
    name: Build (iOS Simulator)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build IOSClient for iOS Simulator
        run: >
          xcodebuild
          -scheme IOSClient
          -destination 'generic/platform=iOS Simulator'
          build
          CODE_SIGNING_ALLOWED=NO
