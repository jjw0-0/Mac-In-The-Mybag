name: 💡 Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what's missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - SharedCore (shared logic)
        - MacOSAgent (macOS)
        - IOSClient (iOS/iPadOS)
        - Transport / networking
        - Security / pairing
        - Docs / tooling
        - Other
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
