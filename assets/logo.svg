<svg width="820" height="220" viewBox="0 0 820 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="820" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/><stop offset="1" stop-color="#141A2E"/>
    </linearGradient>
    <linearGradient id="tile" x1="18" y1="4" x2="112" y2="124" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A78BFA"/><stop offset=".5" stop-color="#7C5CF6"/><stop offset="1" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="scr" x1="37" y1="41" x2="87" y2="75" gradientUnits="userSpaceOnUse">
      <stop stop-color="#BAF7FF"/><stop offset=".5" stop-color="#67E8F9"/><stop offset="1" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#A78BFA"/><stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <radialGradient id="gloss" cx="0.32" cy="0.14" r="0.92">
      <stop stop-color="#FFFFFF" stop-opacity="0.50"/><stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="3.4"/></filter>
    <filter id="ambient" x="-70%" y="-70%" width="240%" height="240%"><feGaussianBlur stdDeviation="11"/></filter>
    <clipPath id="tileclip"><rect width="124" height="124" rx="30"/></clipPath>
  </defs>

  <rect x="1" y="1" width="818" height="218" rx="28" fill="url(#bg)" stroke="#23304D" stroke-width="2"/>

  <g transform="translate(48,48)">
    <!-- ambient lift -->
    <rect x="6" y="12" width="112" height="112" rx="30" fill="#6D28D9" opacity="0.6" filter="url(#ambient)"/>

    <!-- tile -->
    <rect width="124" height="124" rx="30" fill="url(#tile)"/>

    <g clip-path="url(#tileclip)">
      <!-- top sheen -->
      <path d="M-6 -6 H130 V30 Q62 6 -6 30 Z" fill="#FFFFFF" opacity="0.16"/>
      <!-- gloss -->
      <rect width="124" height="124" rx="30" fill="url(#gloss)"/>

      <!-- screen + waves GLOW (blurred) -->
      <g filter="url(#glow)">
        <rect x="37" y="41" width="50" height="34" rx="4" fill="#5EE6FB"/>
        <g stroke="#A7F3FF" stroke-width="4.5" fill="none" stroke-linecap="round">
          <path d="M98 24 q13 13 0 26"/><path d="M90 31 q7 7 0 13"/>
        </g>
      </g>

      <!-- macbook -->
      <rect x="32" y="36" width="60" height="44" rx="6" fill="#0B1020"/>
      <rect x="37" y="41" width="50" height="34" rx="3" fill="url(#scr)"/>
      <path d="M37 52 Q60 45 87 49 L87 41 H37 Z" fill="#FFFFFF" opacity="0.16"/>
      <path d="M56 50 L56 66 L70 58 Z" fill="#0B1020" fill-opacity="0.80"/>
      <path d="M24 84 H100 L94 92 H30 Z" fill="#EEF2FF"/>
      <path d="M24 84 H100 L98.6 86 H25.4 Z" fill="#A5B4FC"/>
      <rect x="50" y="84" width="24" height="3" rx="1.5" fill="#0B1020" fill-opacity="0.18"/>

      <!-- waves (crisp) -->
      <g stroke="#FFFFFF" stroke-width="4.5" fill="none" stroke-linecap="round">
        <path d="M98 24 q13 13 0 26"/><path d="M90 31 q7 7 0 13"/>
      </g>
      <circle cx="86" cy="37" r="2.5" fill="#FFFFFF"/>
    </g>

    <!-- bevel -->
    <rect x="1" y="1" width="122" height="122" rx="29" fill="none" stroke="#FFFFFF" stroke-opacity="0.30" stroke-width="1.4"/>
    <rect x="0.6" y="0.6" width="122.8" height="122.8" rx="29.4" fill="none" stroke="#1E1B4B" stroke-opacity="0.22" stroke-width="1"/>
  </g>

  <!-- wordmark -->
  <text x="200" y="90" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="42" font-weight="800" fill="#F8FAFC">Mac-In-The-Mybag</text>
  <g transform="translate(200,106)">
    <rect width="78" height="30" rx="8" fill="url(#accent)"/>
    <text x="39" y="21" text-anchor="middle" font-family="-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="16" font-weight="800" fill="#0B1020" letter-spacing="3">MITM</text>
  </g>
  <text x="292" y="128" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="16.5" font-weight="500" fill="#94A3B8">Your MacBook lives in your bag. Drive it from your iPhone.</text>
  <text x="200" y="178" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" fill="#64748B">QUIC · ScreenCaptureKit · CGEvent · QR + ECDH · TLS 1.3</text>
</svg>
